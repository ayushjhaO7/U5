name: Unit V — AI Crime Analytics CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8

    - name: Data Ingestion
      run: |
        CRIME_DATA_PATH=data/cleaned_crime_data.csv python src/data/data_preparation.py

    - name: Model Training (PySpark K-Means)
      run: |
        python src/model/model_training.py

    - name: Build & Launch Docker Stack
      run: |
        docker compose build
        docker compose up -d
        sleep 15

    - name: Verify API Health
      run: |
        curl -f http://localhost:5000/health

    - name: Cleanup
      if: always()
      run: |
        docker compose down -v
